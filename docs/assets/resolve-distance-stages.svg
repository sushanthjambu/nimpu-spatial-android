<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="470" viewBox="0 0 1200 470" role="img" aria-labelledby="title desc">
  <title id="title">Resolve stages by distance</title>
  <desc id="desc">The SDK resolve flow shows a far coarse geospatial state beyond 200 meters, coarse guidance between 50 and 200 meters, precise visual search near 50 meters, and a final locked AR pin.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#245f68"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1d3557" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1200" height="470" rx="22" fill="#fbfcfd"/>
  <rect x="34" y="34" width="1132" height="402" rx="20" fill="#f5faf9" stroke="#d8e4e1"/>

  <text x="64" y="78" fill="#16323f" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">What the resolver sees as they get closer</text>
  <text x="64" y="110" fill="#53666d" font-family="Inter, Arial, sans-serif" font-size="17">Default SDK thresholds: far &gt; 200 m, approach at 50 m, precise search at 50 m or close altitude.</text>

  <line x1="164" y1="250" x2="1020" y2="250" stroke="#245f68" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow)"/>

  <g transform="translate(64 136)" filter="url(#shadow)">
    <rect width="244" height="230" rx="14" fill="#ffffff" stroke="#d3dfdc"/>
    <text x="24" y="36" fill="#16323f" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Far target</text>
    <text x="24" y="62" fill="#2f6f73" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">&gt; 200 m</text>
    <rect x="44" y="92" width="54" height="54" fill="#e8eee9" stroke="#b8c9c5"/>
    <rect x="112" y="78" width="70" height="68" fill="#edf4f2" stroke="#b8c9c5"/>
    <path d="M143 86 c0 -21 32 -21 32 0 c0 19 -16 36 -16 36 s-16 -17 -16 -36z" fill="#cf3f43"/>
    <circle cx="159" cy="86" r="5" fill="#ffffff"/>
    <text x="24" y="184" fill="#53666d" font-family="Inter, Arial, sans-serif" font-size="14">Coarse geospatial pin</text>
    <text x="24" y="204" fill="#53666d" font-family="Inter, Arial, sans-serif" font-size="14">is shown when available.</text>
  </g>

  <g transform="translate(332 136)" filter="url(#shadow)">
    <rect width="244" height="230" rx="14" fill="#ffffff" stroke="#d3dfdc"/>
    <text x="24" y="36" fill="#16323f" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Coarse guidance</text>
    <text x="24" y="62" fill="#2f6f73" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">50-200 m</text>
    <path d="M44 122 c30 -34 58 26 92 -8 c24 -22 44 -11 70 13" fill="none" stroke="#b8c9c5" stroke-width="6" stroke-linecap="round"/>
    <path d="M142 88 c0 -23 34 -23 34 0 c0 21 -17 40 -17 40 s-17 -19 -17 -40z" fill="#cf3f43"/>
    <circle cx="159" cy="88" r="6" fill="#ffffff"/>
    <text x="24" y="184" fill="#53666d" font-family="Inter, Arial, sans-serif" font-size="14">Follow the coarse AR</text>
    <text x="24" y="204" fill="#53666d" font-family="Inter, Arial, sans-serif" font-size="14">direction toward the pin.</text>
  </g>

  <g transform="translate(600 136)" filter="url(#shadow)">
    <rect width="244" height="230" rx="14" fill="#ffffff" stroke="#d3dfdc"/>
    <text x="24" y="36" fill="#16323f" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Precise search</text>
    <text x="24" y="62" fill="#2f6f73" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">within 50 m, or altitude close</text>
    <rect x="46" y="84" width="72" height="66" rx="12" fill="#173947"/>
    <rect x="56" y="97" width="52" height="40" rx="6" fill="#e7f2ff"/>
    <path d="M140 95 h58" stroke="#b8c9c5" stroke-width="6" stroke-linecap="round"/>
    <path d="M140 120 h72" stroke="#b8c9c5" stroke-width="6" stroke-linecap="round"/>
    <path d="M140 145 h48" stroke="#b8c9c5" stroke-width="6" stroke-linecap="round"/>
    <text x="24" y="184" fill="#53666d" font-family="Inter, Arial, sans-serif" font-size="14">Search for the saved</text>
    <text x="24" y="204" fill="#53666d" font-family="Inter, Arial, sans-serif" font-size="14">visual spot.</text>
  </g>

  <g transform="translate(868 136)" filter="url(#shadow)">
    <rect width="244" height="230" rx="14" fill="#ffffff" stroke="#d3dfdc"/>
    <text x="24" y="36" fill="#16323f" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Pin locked</text>
    <text x="24" y="62" fill="#2f6f73" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">precise AR pose</text>
    <rect x="48" y="84" width="66" height="66" rx="3" fill="#f5f0e8" stroke="#c7bfae"/>
    <circle cx="84" cy="124" r="6" fill="#ad8453"/>
    <path d="M154 88 c0 -25 38 -25 38 0 c0 23 -19 45 -19 45 s-19 -22 -19 -45z" fill="#cf3f43"/>
    <circle cx="173" cy="88" r="7" fill="#ffffff"/>
    <path d="M134 148 h76" stroke="#8b9f9a" stroke-width="5" stroke-linecap="round"/>
    <text x="24" y="184" fill="#53666d" font-family="Inter, Arial, sans-serif" font-size="14">Render the final AR pin</text>
    <text x="24" y="204" fill="#53666d" font-family="Inter, Arial, sans-serif" font-size="14">at the saved place.</text>
  </g>
</svg>
